<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
    body { margin: 0; background: #0c1a0c; color: white; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
    .panel { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 12px; text-align: center; border: 2px solid #444; width: 220px; position: absolute; z-index: 10; }
    canvas { border: 4px solid #333; background: #0f240f; display: none; max-width: 90vw; max-height: 90vw; }
    button { display: block; width: 100%; padding: 10px; margin: 8px 0; cursor: pointer; background: #2a7fff; color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:hover { background: #1a60dd; }
    select { width: 100%; padding: 8px; margin: 5px 0; }
</style>
</head>
<body>

<div id="mainMenu" class="panel">
    <h1>Snake</h1>
    <button onclick="startGame()">Play</button>
    <button onclick="showSettings()">Settings</button>
</div>

<div id="settings" class="panel" style="display:none;">
    <h3>⚙️ Settings</h3>
    <select id="gridSize"><option value="7">Map: 7x7</option><option value="10" selected>Map: 10x10</option><option value="20">Map: 20x20</option></select>
    <select id="shapeSelect"><option value="round">Shape: Rounded</option><option value="square">Shape: Square</option></select>
    <select id="speedSelect"><option value="0.12">Turtle [Glitched style]</option><option value="0.10" selected>Speed: Snake</option><option value="0.17">Speed: Bunny</option></select>
    <button onclick="backToMenu()">Back</button>
</div>

<div id="gameOver" class="panel" style="display:none;">
    <h3>Game Over</h3>
    <button onclick="startGame()">Retry</button>
    <button onclick="backToMenu()">Main Menu</button>
</div>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let gridSize, snake, dir, nextDir, apple, pos, speed, running;

function showSettings() { document.getElementById('mainMenu').style.display='none'; document.getElementById('settings').style.display='block'; }
function backToMenu() { document.getElementById('settings').style.display='none'; document.getElementById('gameOver').style.display='none'; document.getElementById('mainMenu').style.display='block'; }

function startGame() {
    gridSize = parseInt(document.getElementById("gridSize").value);
    speed = parseFloat(document.getElementById("speedSelect").value);
    document.getElementById('mainMenu').style.display = "none";
    document.getElementById('settings').style.display = "none";
    document.getElementById('gameOver').style.display = "none";
    canvas.style.display = "block";
    
    snake = [{x: 2, y: 0}, {x: 1, y: 0}, {x: 0, y: 0}];
    dir = {x: 1, y: 0}; nextDir = {x: 1, y: 0};
    pos = {x: 0, y: 0}; 
    running = true;
    spawnApple();
    requestAnimationFrame(render);
}

function spawnApple() {
    apple = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
}

function render() {
    if (!running) return;
    
    pos.x += (snake[0].x - pos.x) * speed * 2.1;
    pos.y += (snake[0].y - pos.y) * speed * 2.1;

    if (Math.abs(pos.x - snake[0].x) < 0.1 && Math.abs(pos.y - snake[0].y) < 0.1) {
        let head = { x: snake[0].x + nextDir.x, y: snake[0].y + nextDir.y };
        dir = nextDir;
        if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize || snake.some(s => s.x === head.x && s.y === head.y)) {
            running = false; canvas.style.display = "none"; document.getElementById('gameOver').style.display = "block"; return;
        }
        snake.unshift(head);
        if (head.x === apple.x && head.y === apple.y) spawnApple(); else snake.pop();
    }
    draw();
    requestAnimationFrame(render);
}

function draw() {
    let ts = 400 / gridSize;
    let shape = document.getElementById("shapeSelect").value;
    ctx.fillStyle = "#0f240f"; ctx.fillRect(0, 0, 400, 400);
    ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(apple.x*ts+ts/2, apple.y*ts+ts/2, ts/3, 0, Math.PI*2); ctx.fill();

    ctx.strokeStyle = "#2a7fff";
    ctx.lineWidth = ts * 0.8;
    ctx.lineJoin = shape === "round" ? "round" : "miter";
    ctx.lineCap = shape === "round" ? "round" : "square";
    
    ctx.beginPath();
    ctx.moveTo(pos.x*ts+ts/2, pos.y*ts+ts/2);
    for(let i=1; i<snake.length; i++) ctx.lineTo(snake[i].x*ts+ts/2 + (Math.random()*2), snake[i].y*ts+ts/2 + (Math.random()*2));
    ctx.stroke();

    ctx.strokeStyle = "black"; ctx.lineWidth = ts * 0.4;
    ctx.beginPath();
    if (Math.abs(dir.x) > 0) { ctx.moveTo(pos.x*ts+ts/2, pos.y*ts+ts/4); ctx.lineTo(pos.x*ts+ts/2, pos.y*ts+ts*0.75); }
    else { ctx.moveTo(pos.x*ts+ts/4, pos.y*ts+ts/2); ctx.lineTo(pos.x*ts+ts*0.75, pos.y*ts+ts/2); }
    ctx.stroke();
}

window.addEventListener("keydown", e => {
    let k = e.key.toLowerCase();
    if((k==="arrowup"||k==="w") && dir.y===0) nextDir = {x: 0, y: -1};
    else if((k==="arrowdown"||k==="s") && dir.y===0) nextDir = {x: 0, y: 1};
    else if((k==="arrowleft"||k==="a") && dir.x===0) nextDir = {x: -1, y: 0};
    else if((k==="arrowright"||k==="d") && dir.x===0) nextDir = {x: 1, y: 0};
});

// MOBILE SWIPE GESTURES
let touchStartX = 0;
let touchStartY = 0;

window.addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener("touchend", e => {
    if (!running) return;
    let touchEndX = e.changedTouches[0].clientX;
    let touchEndY = e.changedTouches[0].clientY;
    
    let diffX = touchEndX - touchStartX;
    let diffY = touchEndY - touchStartY;
    
    // Check if the gesture was long enough to count as a swipe
    if (Math.max(Math.abs(diffX), Math.abs(diffY)) > 30) {
        if (Math.abs(diffX) > Math.abs(diffY)) {
            // Horizontal Swipes
            if (diffX > 0 && dir.x === 0) nextDir = {x: 1, y: 0};      // Swipe Right
            else if (diffX < 0 && dir.x === 0) nextDir = {x: -1, y: 0}; // Swipe Left
        } else {
            // Vertical Swipes
            if (diffY > 0 && dir.y === 0) nextDir = {x: 0, y: 1};       // Swipe Down
            else if (diffY < 0 && dir.y === 0) nextDir = {x: 0, y: -1};  // Swipe Up
        }
    }
}, { passive: true });
</script>
</body>
</html>
